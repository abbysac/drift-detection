name: OIDC Test

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  oidc-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug OIDC token
        run: |
          echo "OIDC token claims:"
          curl -s "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.claims'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::224761220970:role/github-actions-oidc-role
          aws-region: us-east-1

      - name: List S3 bucket (drift-detection)
        run: aws s3 ls s3://my-example-bucket-drift-detection
