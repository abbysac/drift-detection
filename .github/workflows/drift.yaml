name: "Terraform Drift Detection"

on:
  schedule:
    # Runs at 00:00 UTC every single day (Adjust to your preferences)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual execution via the GitHub Actions UI

permissions:
  id-token: write   # Required for secure OIDC cloud authentication
  contents: read    # Required to check out your repository code
  issues: write     # Required to automatically open tracking issues

jobs:
  drift-check:
    name: "Check Infrastructure Drift"
    runs-on: ubuntu-latest
    
    # Optional env adjustments if passing secrets explicitly
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Authenticate to your Cloud Provider securely via OIDC
      # Replace this step with Azure login or GCP auth if not using AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::224761220970:role/GitHubActionsOIDCRole
          aws-region: us-east-1

      # 2. Install Terraform (CRITICAL: Disable the wrapper to preserve exit codes)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0" # Match your project version
          terraform_wrapper: false   # Essential for -detailed-exitcode to work properly

      - name: Terraform Init
        run: terraform init

      # 3. Execute Plan and catch the detailed exit code
      - name: Check for Drift
        id: plan
        run: |
          # Disable 'exit on error' temporarily so the script doesn't fail on code 2
          set +e 
          
          terraform plan -detailed-exitcode -no-color -input=false > plan_output.txt
          EXIT_CODE=$?
          
          # Re-enable exit on error
          set -e 
          
          # Save outputs for subsequent steps
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          cat plan_output.txt
          
          if [ $EXIT_CODE -eq 2 ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            echo "Drift has been detected in the cloud environment!"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "Terraform plan failed with an execution error."
            exit 1
          else
            echo "No drift detected. Infrastructure is perfectly synced."
          fi

      # 4. Automatically create a GitHub Issue if drift is detected
      - name: Create Drift Alert Issue
        if: env.DRIFT_DETECTED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planLog = fs.readFileSync('plan_output.txt', 'utf8');
            const truncatedLog = planLog.length > 6000 ? planLog.substring(0, 6000) + '\n...[Output Truncated]...' : planLog;
            
            const body = `### Infrastructure Drift Detected
            The scheduled drift detection job found variations between your production environment and code.
            
            #### Terraform Plan Output:
            \`\`\`terraform
            ${truncatedLog}
            \`\`\`
            
            Please review the changes and run a manual deployment or remediate manual console modifications.`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Alert: Terraform Infrastructure Drift Detected',
              body: body,
              labels: ['drift', 'automated-alert']
            });
