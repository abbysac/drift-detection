on:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.8

      - name: Verify Terraform
        run: |
          which terraform
          terraform version

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan